name: Bug Report
description: Report a bug in JuntoAI A2A
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened instead?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running on?
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: docker-version
    attributes:
      label: Docker version
      description: "Run `docker --version` and `docker compose version` and paste the output."
      placeholder: "Docker version 24.0.7, Docker Compose v2.24.0"
    validations:
      required: true

  - type: textarea
    id: llm-provider
    attributes:
      label: LLM provider
      description: Which LLM provider are you using? (e.g., OpenAI, Anthropic, Ollama, Vertex AI)
      placeholder: "e.g., OpenAI with gpt-4o"
    validations:
      required: true
