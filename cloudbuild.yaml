steps:
  # --- Build + Push with kaniko layer caching (parallel) ---
  - id: build-backend
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=./backend/Dockerfile
      - --context=dir:///workspace/backend
      - --destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:$SHORT_SHA
      - --destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:latest
      - --cache=true
      - --cache-ttl=168h
    waitFor: ["-"]

  - id: build-frontend
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=./frontend/Dockerfile
      - --context=dir:///workspace/frontend
      - --destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:$SHORT_SHA
      - --destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:latest
      - --cache=true
      - --cache-ttl=168h
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - --build-arg=NEXT_PUBLIC_RUN_MODE=cloud
    waitFor: ["-"]

  # --- Deploy new revisions with NO traffic (parallel after builds) ---
  - id: write-backend-env
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        cat > /workspace/backend-env.yaml <<EOF
        CORS_ALLOWED_ORIGINS: "https://a2a.juntoai.org,https://${_FRONTEND_SERVICE}-141882351618.${_REGION}.run.app"
        GOOGLE_CLOUD_PROJECT: "${_PROJECT_ID}"
        VERTEX_AI_LOCATION: "${_REGION}"
        EOF
    waitFor: ["-"]

  - id: write-frontend-env
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        cat > /workspace/frontend-env.yaml <<EOF
        BACKEND_URL: "https://${_BACKEND_SERVICE}-141882351618.${_REGION}.run.app"
        EOF
    waitFor: ["-"]

  - id: deploy-backend-no-traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:$SHORT_SHA
      - --region
      - ${_REGION}
      - --service-account
      - ${_BACKEND_SA_EMAIL}
      - --env-vars-file
      - /workspace/backend-env.yaml
      - --timeout
      - "1200"
      - --min-instances
      - "1"
      - --no-cpu-throttling
      - --session-affinity
      - --no-traffic
      - --tag
      - canary
      - --quiet
    waitFor: ["build-backend", "write-backend-env"]

  - id: deploy-frontend-no-traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:$SHORT_SHA
      - --region
      - ${_REGION}
      - --service-account
      - ${_FRONTEND_SA_EMAIL}
      - --env-vars-file
      - /workspace/frontend-env.yaml
      - --no-traffic
      - --tag
      - canary
      - --quiet
    waitFor: ["build-frontend", "write-frontend-env"]

  # --- Migrate traffic: old instances drain active SSE connections gracefully ---
  - id: migrate-backend-traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - ${_BACKEND_SERVICE}
      - --region
      - ${_REGION}
      - --to-latest
      - --quiet
    waitFor: ["deploy-backend-no-traffic"]

  - id: migrate-frontend-traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - ${_FRONTEND_SERVICE}
      - --region
      - ${_REGION}
      - --to-latest
      - --quiet
    waitFor: ["deploy-frontend-no-traffic"]

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west1
  _PROJECT_ID: juntoai-a2a-mvp
  _REPO_NAME: juntoai-docker
  _BACKEND_SERVICE: juntoai-backend
  _FRONTEND_SERVICE: juntoai-frontend
  _BACKEND_SA_EMAIL: backend-sa@juntoai-a2a-mvp.iam.gserviceaccount.com
  _FRONTEND_SA_EMAIL: frontend-sa@juntoai-a2a-mvp.iam.gserviceaccount.com
  _FIREBASE_API_KEY: ""
  _FIREBASE_APP_ID: ""
