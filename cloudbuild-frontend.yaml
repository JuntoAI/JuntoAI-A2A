steps:
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_PROJECT_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://${_BACKEND_SERVICE}-141882351618.${_REGION}.run.app
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:latest
      - ./frontend
    waitFor: ["-"]

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend
    waitFor: ["build-frontend"]

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:$SHORT_SHA
      - --region
      - ${_REGION}
      - --service-account
      - ${_FRONTEND_SA_EMAIL}
      - --quiet
    waitFor: ["push-frontend"]

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west1
  _PROJECT_ID: juntoai-a2a-mvp
  _REPO_NAME: juntoai-docker
  _BACKEND_SERVICE: juntoai-backend
  _FRONTEND_SERVICE: juntoai-frontend
  _FRONTEND_SA_EMAIL: frontend-sa@juntoai-a2a-mvp.iam.gserviceaccount.com
  _FIREBASE_API_KEY: ""
  _FIREBASE_APP_ID: ""
