steps:
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:latest
      - ./backend
    waitFor: ["-"]

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend
    waitFor: ["build-backend"]

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_BACKEND_SERVICE} \
          --image ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:$SHORT_SHA \
          --region ${_REGION} \
          --service-account ${_BACKEND_SA_EMAIL} \
          --set-env-vars "^;^CORS_ALLOWED_ORIGINS=https://a2a.juntoai.org;https://${_FRONTEND_SERVICE}-141882351618.${_REGION}.run.app" \
          --quiet
    waitFor: ["push-backend"]

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/backend:latest

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west1
  _PROJECT_ID: juntoai-a2a-mvp
  _REPO_NAME: juntoai-docker
  _BACKEND_SERVICE: juntoai-backend
  _FRONTEND_SERVICE: juntoai-frontend
  _BACKEND_SA_EMAIL: backend-sa@juntoai-a2a-mvp.iam.gserviceaccount.com
